<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 22px; }
.group { margin-bottom: 16px; }
.group-label { font-size: 10px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
.row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 8px; font-size: 13px; font-weight: 500; border: none;
  cursor: pointer; line-height: 1; letter-spacing: -0.01em; gap: 6px;
  padding: 8px 16px;
  transition: opacity 150ms;
}
.btn:hover { opacity: 0.85; }
.primary     { background: #0f172a; color: #fff; }
.secondary   { background: #ececf0; color: #030213; }
.outline     { background: transparent; border: 1px solid #e2e8f0; color: #0f172a; }
.ghost       { background: transparent; color: #475569; }
.destructive { background: #d4183d; color: #fff; }
.brand       { background: #9333ea; color: #fff; }
.sm  { padding: 5px 12px; font-size: 12px; }
.lg  { padding: 10px 22px; font-size: 15px; border-radius: 10px; }
.divider { height: 1px; background: #f1f5f9; margin: 4px 0 12px; }
</style>
</head><body>

<div class="group">
  <div class="group-label">Variants</div>
  <div class="row">
    <button class="btn primary">Primary</button>
    <button class="btn brand">Brand</button>
    <button class="btn secondary">Secondary</button>
    <button class="btn outline">Outline</button>
    <button class="btn ghost">Ghost</button>
    <button class="btn destructive">Destructive</button>
  </div>
</div>

<div class="divider"></div>

<div class="group">
  <div class="group-label">Sizes</div>
  <div class="row">
    <button class="btn primary sm">Small</button>
    <button class="btn primary">Default</button>
    <button class="btn primary lg">Large</button>
  </div>
</div>

</body></html>
