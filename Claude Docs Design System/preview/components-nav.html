<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; display: flex; gap: 20px; }
.sidebar { width: 180px; background: white; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
.sidebar-head { padding: 12px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 8px; }
.logo { width: 28px; height: 28px; background: #9333ea; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav { padding: 8px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.nav-active { background: #f5f0ff; color: #6d28d9; }
.nav-inactive { color: #475569; }
.nav-inactive:hover { background: #f8fafc; }
.dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
.sidebar-foot { padding: 10px 12px; border-top: 1px solid #f1f5f9; }
.foot-text { font-size: 11px; color: #94a3b8; text-align: center; }
.foot-text strong { color: #9333ea; }
</style>
</head><body>
<div class="sidebar">
  <div class="sidebar-head">
    <div class="logo">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
    </div>
    <div>
      <div style="font-size:12px;font-weight:700;color:#0f172a">Claude Code</div>
      <div style="font-size:10px;color:#94a3b8">Guia de Otimização</div>
    </div>
  </div>
  <div class="nav">
    <div class="nav-item nav-active">
      <div class="dot" style="background:#9333ea"></div> Visão Geral
    </div>
    <div class="nav-item nav-inactive">
      <div class="dot" style="background:#cbd5e1"></div> Recomendações
    </div>
    <div class="nav-item nav-inactive">
      <div class="dot" style="background:#cbd5e1"></div> Prompts
    </div>
    <div class="nav-item nav-inactive">
      <div class="dot" style="background:#cbd5e1"></div> Contexto
    </div>
    <div class="nav-item nav-inactive">
      <div class="dot" style="background:#cbd5e1"></div> Agentes
    </div>
  </div>
  <div class="sidebar-foot">
    <div class="foot-text">Economize até <strong>70%</strong> em custos</div>
  </div>
</div>
</body></html>
