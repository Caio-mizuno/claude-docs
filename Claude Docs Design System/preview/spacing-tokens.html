<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; }
.row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.label { font-size: 10px; color: #94a3b8; font-family: monospace; min-width: 90px; }
.bar { background: #9333ea; height: 16px; border-radius: 3px; opacity: 0.85; }
.val { font-size: 10px; color: #475569; }
</style>
</head><body>
<div class="row"><div class="label">space-1 / 4px</div><div class="bar" style="width:4px"></div><div class="val">4px</div></div>
<div class="row"><div class="label">space-2 / 8px</div><div class="bar" style="width:8px"></div><div class="val">8px</div></div>
<div class="row"><div class="label">space-3 / 12px</div><div class="bar" style="width:12px"></div><div class="val">12px</div></div>
<div class="row"><div class="label">space-4 / 16px ★</div><div class="bar" style="width:16px"></div><div class="val">16px — card gap</div></div>
<div class="row"><div class="label">space-5 / 20px</div><div class="bar" style="width:20px"></div><div class="val">20px — sidebar pad</div></div>
<div class="row"><div class="label">space-6 / 24px</div><div class="bar" style="width:24px"></div><div class="val">24px — section gap</div></div>
<div class="row"><div class="label">space-8 / 32px</div><div class="bar" style="width:32px"></div><div class="val">32px</div></div>
</body></html>
