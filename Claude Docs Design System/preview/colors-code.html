<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f6f8; padding: 24px; }
.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: #98a2b3; margin-bottom: 10px;
}
.terminal {
  background: #0f172a; border-radius: 10px; overflow: hidden;
  border: 1px solid #1e293b;
}
.terminal-bar {
  background: #1e293b; padding: 10px 14px;
  display: flex; align-items: center; gap: 6px;
}
.dot { width: 10px; height: 10px; border-radius: 50%; }
.terminal-body { padding: 16px 18px; }
.line { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.8; }
.cmt  { color: #4a5568; }
.cmd  { color: #6ee7b7; }
.dim  { color: #334155; }
.section { margin-bottom: 18px; }
.inline-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.inline-chip {
  background: #fff; border: 1px solid #e4e7ec;
  border-radius: 6px; padding: 6px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: #475569;
  display: flex; align-items: center; gap: 6px;
}
.inline-chip span { color: #7c3aed; }
</style>
</head><body>

<div class="section">
  <div class="section-label">Terminal — Code Block</div>
  <div class="terminal">
    <div class="terminal-bar">
      <div class="dot" style="background:#ff5f57"></div>
      <div class="dot" style="background:#febc2e"></div>
      <div class="dot" style="background:#28c840"></div>
    </div>
    <div class="terminal-body">
      <div class="line cmt"># Instalar plugins essenciais</div>
      <div class="line cmd">npx claude-mem install</div>
      <div class="line dim" style="margin-top:2px">✓ Claude-Mem instalado com sucesso</div>
      <div class="line cmt" style="margin-top:10px"># Ativar modo Caveman Ultra</div>
      <div class="line cmd">/caveman ultra</div>
      <div class="line dim">→ Compressão máxima ativada (75% redução)</div>
      <div class="line cmt" style="margin-top:10px"># Ver economia acumulada</div>
      <div class="line cmd">rtk gain</div>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-label">Inline Code</div>
  <div class="inline-row">
    <div class="inline-chip"><span>@</span>task.md</div>
    <div class="inline-chip">CLAUDE.md</div>
    <div class="inline-chip"><span>/</span>caveman ultra</div>
    <div class="inline-chip">rtk gain</div>
    <div class="inline-chip"><span>/</span>reload-plugins</div>
  </div>
</div>

</body></html>
