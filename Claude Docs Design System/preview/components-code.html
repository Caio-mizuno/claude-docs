<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; }
.block { background: #0f172a; border-radius: 10px; padding: 16px; margin-bottom: 10px; }
.comment { color: #94a3b8; font-size: 11px; font-family: 'Fira Code', 'Courier New', monospace; margin-bottom: 6px; }
.code-line { color: #4ade80; font-size: 13px; font-family: 'Fira Code', 'Courier New', monospace; margin-bottom: 3px; }
.caveman { background: #0f172a; border-radius: 10px; padding: 14px 16px; }
.caveman pre { color: #4ade80; font-size: 12px; font-family: 'Fira Code', 'Courier New', monospace; white-space: pre-wrap; line-height: 1.6; }
</style>
</head><body>
<div class="block">
  <div class="comment"># Install plugins</div>
  <div class="code-line">npx claude-mem install</div>
  <div class="comment" style="margin-top:8px"># Start session</div>
  <div class="code-line">cd /caminho/do/projeto</div>
  <div class="code-line">claude</div>
</div>
<div class="caveman">
  <pre>/caveman ultra
use caveman ultra
@task.md siga estas instruções utilizando agentes e skills</pre>
</div>
</body></html>
